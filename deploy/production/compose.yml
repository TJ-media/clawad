name: clawad-production

services:
  postgres:
    image: postgres:16.9-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${BACKUP_DIR:-./backups}:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [backend]

  redis:
    image: redis:7.4.5-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ['sh', '-c', 'exec redis-server --appendonly yes --appendfsync always --requirepass "$$REDIS_PASSWORD"']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [backend]

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
      args:
        RELEASE_SHA: ${RELEASE_SHA:?RELEASE_SHA is required}
    image: clawad-api:${RELEASE_SHA:?RELEASE_SHA is required}
    labels:
      ai.clawad.rollback-revision: ${ROLLBACK_SHA:?ROLLBACK_SHA is required}
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_SSL: 'false'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      SERVE_TOKEN_SECRET: ${SERVE_TOKEN_SECRET:?SERVE_TOKEN_SECRET is required}
      CLICK_TOKEN_SECRET: ${CLICK_TOKEN_SECRET:?CLICK_TOKEN_SECRET is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-false}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      CLAWAD_TEST_REHEARSAL_ENABLED: ${CLAWAD_TEST_REHEARSAL_ENABLED:-false}
      CLAWAD_TEST_REHEARSAL_USER_IDS: ${CLAWAD_TEST_REHEARSAL_USER_IDS:-}
      AUTH_COOKIE_SECURE: 'true'
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      SOCIAL_CALLBACK_BASE_URL: https://${API_DOMAIN:?API_DOMAIN is required}
      SOCIAL_RETURN_ALLOWLIST: ${SOCIAL_RETURN_ALLOWLIST:?SOCIAL_RETURN_ALLOWLIST is required}
      PUBLIC_WEB_ORIGIN: https://${WEB_DOMAIN:?WEB_DOMAIN is required}
      PUBLIC_RELEASE_STAGE: ${PUBLIC_RELEASE_STAGE:?PUBLIC_RELEASE_STAGE is required}
      SOCIAL_METRICS_RETENTION_DAYS: ${SOCIAL_METRICS_RETENTION_DAYS:-30}
      SOCIAL_GOOGLE_CLIENT_ID: ${SOCIAL_GOOGLE_CLIENT_ID:-}
      SOCIAL_GOOGLE_CLIENT_SECRET: ${SOCIAL_GOOGLE_CLIENT_SECRET:-}
      SOCIAL_GOOGLE_ENABLED: ${SOCIAL_GOOGLE_ENABLED:?SOCIAL_GOOGLE_ENABLED is required}
      SOCIAL_KAKAO_CLIENT_ID: ${SOCIAL_KAKAO_CLIENT_ID:-}
      SOCIAL_KAKAO_CLIENT_SECRET: ${SOCIAL_KAKAO_CLIENT_SECRET:-}
      SOCIAL_KAKAO_ENABLED: ${SOCIAL_KAKAO_ENABLED:?SOCIAL_KAKAO_ENABLED is required}
      SOCIAL_NAVER_CLIENT_ID: ${SOCIAL_NAVER_CLIENT_ID:-}
      SOCIAL_NAVER_CLIENT_SECRET: ${SOCIAL_NAVER_CLIENT_SECRET:-}
      SOCIAL_NAVER_ENABLED: ${SOCIAL_NAVER_ENABLED:?SOCIAL_NAVER_ENABLED is required}
      LEGAL_TERMS_VERSION: ${LEGAL_TERMS_VERSION:?LEGAL_TERMS_VERSION is required}
      LEGAL_TERMS_URL: ${LEGAL_TERMS_URL:?LEGAL_TERMS_URL is required}
      LEGAL_TERMS_EFFECTIVE_AT: ${LEGAL_TERMS_EFFECTIVE_AT:?LEGAL_TERMS_EFFECTIVE_AT is required}
      LEGAL_PRIVACY_VERSION: ${LEGAL_PRIVACY_VERSION:?LEGAL_PRIVACY_VERSION is required}
      LEGAL_PRIVACY_URL: ${LEGAL_PRIVACY_URL:?LEGAL_PRIVACY_URL is required}
      LEGAL_PRIVACY_EFFECTIVE_AT: ${LEGAL_PRIVACY_EFFECTIVE_AT:?LEGAL_PRIVACY_EFFECTIVE_AT is required}
      LEGAL_PRIVACY_CONTACT_URL: ${LEGAL_PRIVACY_CONTACT_URL:?LEGAL_PRIVACY_CONTACT_URL is required}
      LEGAL_REMOVAL_GUIDE_URL: ${LEGAL_REMOVAL_GUIDE_URL:?LEGAL_REMOVAL_GUIDE_URL is required}
      ROLLBACK_SHA: ${ROLLBACK_SHA:?ROLLBACK_SHA is required}
      MONITORING_TOKEN_FILE: /run/secrets/monitoring_token
      OBSERVABILITY_WINDOW_MINUTES: ${OBSERVABILITY_WINDOW_MINUTES:-15}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [backend, edge]
    secrets: [monitoring_token]

  user-web:
    build:
      context: ../..
      dockerfile: apps/user-web/Dockerfile
      args:
        RELEASE_SHA: ${RELEASE_SHA:?RELEASE_SHA is required}
    image: clawad-user-web:${RELEASE_SHA:?RELEASE_SHA is required}
    labels:
      ai.clawad.rollback-revision: ${ROLLBACK_SHA:?ROLLBACK_SHA is required}
    restart: unless-stopped
    command: ['caddy', 'run', '--config', '/etc/caddy/user-web.Caddyfile', '--adapter', 'caddyfile']
    environment:
      RELEASE_SHA: ${RELEASE_SHA:?RELEASE_SHA is required}
    volumes:
      - ${LEGAL_PUBLIC_DIR:?LEGAL_PUBLIC_DIR is required}:/srv/legal:ro
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:8080/healthz']
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [edge]

  prometheus:
    image: prom/prometheus:v3.10.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    secrets: [monitoring_token]
    # API가 unhealthy이거나 아직 기동되지 않았을 때도 up=0을 수집해 경보해야 한다.
    depends_on:
      alertmanager: { condition: service_started }
    networks: [backend]

  alertmanager:
    image: prom/alertmanager:v0.32.1
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    secrets: [alert_webhook_url]
    # 외부 HTTPS webhook 송신을 위해 egress 가능한 edge에도 연결하되 host port는 열지 않는다.
    networks: [backend, edge]

  grafana:
    image: grafana/grafana:13.0.3
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-clawad-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SECURITY_DISABLE_GRAVATAR: 'true'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_NEWS_NEWS_FEED_ENABLED: 'false'
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: 'false'
    ports:
      - '127.0.0.1:${GRAFANA_PORT:-3001}:3000'
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    secrets: [grafana_admin_password]
    depends_on:
      prometheus: { condition: service_started }
    networks: [backend]

  caddy:
    image: clawad-user-web:${RELEASE_SHA:?RELEASE_SHA is required}
    labels:
      ai.clawad.rollback-revision: ${ROLLBACK_SHA:?ROLLBACK_SHA is required}
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required}
      WEB_DOMAIN: ${WEB_DOMAIN:?WEB_DOMAIN is required}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
      RELEASE_SHA: ${RELEASE_SHA:?RELEASE_SHA is required}
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:8081/healthz']
      interval: 10s
      timeout: 5s
      retries: 20
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api: { condition: service_healthy }
      user-web: { condition: service_healthy }
    networks: [edge]

  postgres-restore:
    image: postgres:16.9-alpine
    profiles: [restore-drill]
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: clawad_restore
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ${BACKUP_DIR:-./backups}:/backups:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 3s
      timeout: 3s
      retries: 20
    networks: [backend]

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  alertmanager-data:
  grafana-data:

networks:
  backend:
    internal: true
  edge:

secrets:
  monitoring_token:
    file: ${MONITORING_TOKEN_FILE:?MONITORING_TOKEN_FILE is required}
  alert_webhook_url:
    file: ${ALERT_WEBHOOK_URL_FILE:?ALERT_WEBHOOK_URL_FILE is required}
  grafana_admin_password:
    file: ${GRAFANA_ADMIN_PASSWORD_FILE:?GRAFANA_ADMIN_PASSWORD_FILE is required}
