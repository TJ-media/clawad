global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    service: clawad
    environment: alpha

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: clawad-api
    metrics_path: /monitor/v1/metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/monitoring_token
    static_configs:
      - targets: ['api:3000']

  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']
