global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    service: clawad
    environment: alpha

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: clawad-api
    metrics_path: /monitor/v1/metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/monitoring_token
    static_configs:
      - targets: ['api:3000']

  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  # 호스트 메모리·swap·디스크·CPU·OOM (CLAW-76)
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # 컨테이너별 메모리·CPU·재시작·OOM 이벤트 (CLAW-76)
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
