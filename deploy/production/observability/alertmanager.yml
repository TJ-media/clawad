global:
  resolve_timeout: 5m

route:
  receiver: operations-webhook
  group_by: ['alertname', 'severity', 'component', 'provider', 'dependency']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: operations-webhook
    webhook_configs:
      - url_file: /run/secrets/alert_webhook_url
        send_resolved: true

inhibit_rules:
  - source_matchers: ['alertname="ClawadApiDown"']
    target_matchers: ['component="api"']
    equal: ['service']
