# 클로애드 P1 로컬 인프라 (CLAW-10).
# 운영 자격증명은 시크릿 매니저로 관리한다. 아래 값은 로컬 개발 전용이다.
#
# 호스트 포트는 기본값(5432/6379)을 피한다 — 같은 머신의 다른 프로젝트와 충돌하지 않게 한다.
# 컨테이너 내부 포트는 표준값을 유지한다.
services:
  postgres:
    image: postgres:16-alpine
    container_name: clawad-postgres
    environment:
      POSTGRES_USER: clawad
      POSTGRES_PASSWORD: clawad_local_dev
      POSTGRES_DB: clawad
    ports:
      - '55432:5432'
    volumes:
      - clawad-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U clawad -d clawad']
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: clawad-redis
    command: ['redis-server', '--appendonly', 'yes', '--appendfsync', 'always']
    ports:
      - '56379:6379'
    volumes:
      - clawad-redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  clawad-pgdata:
  clawad-redisdata:
