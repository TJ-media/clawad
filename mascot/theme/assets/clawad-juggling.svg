    <rect class="ln ln1" x="344" y="566" width="90" height="10" fill="#9fb0e8"/>
    <rect class="ln ln2" x="344" y="584" width="120" height="10" fill="#7ec8ff"/>
    <rect class="ln ln3" x="360" y="602" width="80" height="10" fill="#9fb0e8"/>
    <rect class="ln ln4" x="344" y="620" width="60" height="10" fill="#ffd23e"/>
    <rect class="caret" x="410" y="620" width="12" height="10" fill="#ffffff"/>
    <rect x="395" y="670" width="40" height="18" fill="#1e2235"/>
