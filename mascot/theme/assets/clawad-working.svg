<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 0 780 760">
  <style>
    image { image-rendering: pixelated; }
    .face { transform: scale(0.75); transform-origin: 239px 365px; }
    .ant-l { transform-origin: 175px 341px; }
    .ant-r { transform-origin: 233px 338px; }
    .arm-big { transform-origin: 330px 500px; }
    .claw-up { transform-origin: 388px 372px; }
    .arm-sm { transform-origin: 188px 545px; }
    .blink { transform-origin: 222px 390px; }
    .brow-l { transform-origin: 154px 296px; }
    .brow-r { transform-origin: 291px 296px; }
    .pet { transform-origin: 222px 700px; }
    .tail { transform-origin: 190px 560px; }

    .pet { animation: wkBounce 0.35s steps(2, jump-none) infinite; }
    @keyframes wkBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    .lg { animation: wkTap 0.35s steps(2, jump-none) infinite; }
    .lg2 { animation-delay: 0.09s; }
    .lg3 { animation-delay: 0.18s; }
    .lg4 { animation-delay: 0.27s; }
    @keyframes wkTap { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(9px); } }
    .tail { animation: wkTail 1.1s ease-in-out infinite alternate; }
    @keyframes wkTail { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }
    .arm-sm { animation: wkArm 1.2s ease-in-out infinite alternate; }
    @keyframes wkArm { from { transform: rotate(-5deg); } to { transform: rotate(1deg); } }
    .arm-big { animation: wkArmR 1.4s ease-in-out infinite alternate; }
    @keyframes wkArmR { from { transform: rotate(-1deg); } to { transform: rotate(2deg); } }
    .claw-up { animation: wkSnap 0.8s steps(2, jump-none) infinite; }
    @keyframes wkSnap { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-14deg); } }
    .ant-l { animation: wkAntL 0.9s ease-in-out infinite alternate; }
    .ant-r { animation: wkAntR 0.9s ease-in-out infinite alternate; }
    @keyframes wkAntL { from { transform: rotate(-14deg); } to { transform: rotate(12deg); } }
    @keyframes wkAntR { from { transform: rotate(14deg); } to { transform: rotate(-12deg); } }
    .blink { animation: wkBlink 3.1s ease-in-out infinite; }
    @keyframes wkBlink { 0%, 93%, 100% { transform: scaleY(1); } 96% { transform: scaleY(0.42); } }
    .brow-l { transform: rotate(24deg) scaleY(0.75); }
    .brow-r { transform: rotate(-24deg) scaleY(0.75); }

    .kt { fill: #4a5070; }
    .kb { fill: #3a405c; }
    .key { transform-box: fill-box; }
    @keyframes keyPress {
      0%, 74%, 90%, 100% { fill: #4a5070; transform: translateY(0); }
      78%, 86% { fill: #9fb0e8; transform: translateY(2px); }
    }
    @keyframes keyPressB {
      0%, 74%, 90%, 100% { fill: #3a405c; transform: translateY(0); }
      78%, 86% { fill: #9fb0e8; transform: translateY(2px); }
    }
    .k1 { animation: keyPress 2.9s steps(1) 0s infinite; }
    .k2 { animation: keyPress 3.4s steps(1) 1.3s infinite; }
    .k3 { animation: keyPress 3.1s steps(1) 2.1s infinite; }
    .k4 { animation: keyPress 3.8s steps(1) 0.7s infinite; }
    .k5 { animation: keyPress 2.7s steps(1) 1.8s infinite; }
    .k6 { animation: keyPress 3.6s steps(1) 0.3s infinite; }
    .k7 { animation: keyPressB 3.3s steps(1) 2.6s infinite; }
    .k8 { animation: keyPressB 2.8s steps(1) 1.1s infinite; }
    .k9 { animation: keyPressB 3.7s steps(1) 0.5s infinite; }
    .k10 { animation: keyPressB 3s steps(1) 2.3s infinite; }
    .k11 { animation: keyPressB 3.5s steps(1) 1.6s infinite; }
    .k12 { animation: keyPressB 2.6s steps(1) 0.9s infinite; }
    .k13 { animation: keyPressB 3.2s steps(1) 2.9s infinite; }

  </style>

  <rect x="60" y="698" width="420" height="12" fill="#1e2235" opacity="0.16"/><rect x="80" y="710" width="380" height="6" fill="#1e2235" opacity="0.09"/>
  <g><rect x="56" y="618" width="340" height="118" rx="12" fill="#1e2235"/><rect class="key kt k1" x="70" y="632" width="40" height="30" rx="5"/><rect class="key kt k2" x="118" y="632" width="40" height="30" rx="5"/><rect class="key kt k3" x="166" y="632" width="40" height="30" rx="5"/><rect class="key kt k4" x="214" y="632" width="40" height="30" rx="5"/><rect class="key kt k5" x="262" y="632" width="40" height="30" rx="5"/><rect class="key kt k6" x="310" y="632" width="40" height="30" rx="5"/><rect class="key kb k7" x="70" y="670" width="40" height="30" rx="5"/><rect class="key kb k8" x="118" y="670" width="40" height="30" rx="5"/><rect class="key kb k9" x="166" y="670" width="40" height="30" rx="5"/><rect class="key kb k10" x="214" y="670" width="40" height="30" rx="5"/><rect class="key kb k11" x="262" y="670" width="40" height="30" rx="5"/><rect class="key kb k12" x="310" y="670" width="40" height="30" rx="5"/><rect class="key kb k13" x="118" y="708" width="216" height="18" rx="5"/></g>
  <g class="pet">
  <g class="ant-l"><image href="p-antenna-left.png" x="69" y="122" width="112" height="228"/></g>
  <g class="ant-r"><image href="p-antenna-right.png" x="164" y="115" width="81" height="232"/></g>
  <g class="arm-big">
    <g style="transform:rotate(10deg);transform-origin:343px 421px"><image href="p-arm-left.png" x="275" y="323" width="137" height="197"/></g>
    <image href="p-claw-2.png" x="385" y="57" width="221" height="334"/>
    <g class="claw-up"><image href="p-claw-1.png" x="280" y="87" width="159" height="295"/></g>
  </g>
  <image href="p-tail-side.png" x="-45" y="470" width="250" height="200" class="tail"/>
  <g class="lg lg1"><image href="p-leg-1.png" x="90" y="550" width="60" height="102"/></g>
  <g class="lg lg2"><image href="p-leg-2.png" x="145" y="558" width="52" height="103"/></g>
  <g class="lg lg3"><image href="p-leg-3.png" x="205" y="558" width="52" height="103"/></g>
  <g class="lg lg4"><image href="p-leg-4.png" x="260" y="550" width="58" height="101"/></g>
  <image href="p-body-face.png" x="123" y="264" width="199" height="338"/>
  <g class="arm-sm"><image href="p-arm-right.png" x="73" y="405" width="123" height="177"/></g>
  
  <g class="face">
    <g class="brow-l"><image href="p-brow-l.png" x="133" y="283" width="42" height="26"/></g>
    <g class="brow-r"><image href="p-brow-r.png" x="271" y="283" width="41" height="26"/></g>
    <g class="blink"><image href="p-eye-l.png" x="130" y="326" width="45" height="72"/><image href="p-eye-r.png" x="270" y="326" width="43" height="72"/></g>
    <image href="p-cheek-left.png" x="117" y="400" width="66" height="36"/><image href="p-cheek-right.png" x="262" y="395" width="64" height="36"/><image href="p-mouth.png" x="183" y="408" width="79" height="57"/>
  </g>
  
  
  </g>
</svg>
