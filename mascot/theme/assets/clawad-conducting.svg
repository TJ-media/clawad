<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 0 780 760">
  <style>
    image { image-rendering: pixelated; }
    .face { transform: scale(0.75); transform-origin: 239px 365px; }
    .ant-l { transform-origin: 175px 341px; }
    .ant-r { transform-origin: 233px 338px; }
    .arm-big { transform-origin: 330px 500px; }
    .claw-up { transform-origin: 388px 372px; }
    .arm-sm { transform-origin: 188px 545px; }
    .blink { transform-origin: 222px 390px; }
    .mouth { transform-origin: 222px 437px; }
    .brow-l { transform-origin: 154px 296px; }
    .brow-r { transform-origin: 291px 296px; }
    .pet { transform-origin: 222px 700px; }
    .tail { transform-origin: 190px 560px; }

    .pet { animation: cdSway 1.6s ease-in-out infinite alternate; }
    @keyframes cdSway { from { transform: rotate(-2deg); } to { transform: rotate(2deg); } }
    .arm-sm { animation: cdWave 0.8s ease-in-out infinite alternate; }
    @keyframes cdWave { from { transform: translateY(-28px) rotate(-26deg); } to { transform: translateY(-28px) rotate(8deg); } }
    .arm-big { animation: cdArmR 0.8s ease-in-out 0.4s infinite alternate backwards; }
    @keyframes cdArmR { from { transform: translateY(14px) rotate(-3deg); } to { transform: translateY(14px) rotate(3deg); } }
    .claw-up { animation: cdSnap 1.6s steps(2, jump-none) infinite; }
    @keyframes cdSnap { 0%, 40%, 100% { transform: rotate(-2deg); } 50%, 90% { transform: rotate(-12deg); } }
    .brow-l { transform: translateY(-6px); }
    .brow-r { transform: translateY(-6px); }
    .ant-l { animation: cdAntL 0.8s ease-in-out infinite alternate; }
    .ant-r { animation: cdAntR 0.8s ease-in-out infinite alternate; }
    @keyframes cdAntL { from { transform: rotate(-10deg); } to { transform: rotate(6deg); } }
    @keyframes cdAntR { from { transform: rotate(-6deg); } to { transform: rotate(10deg); } }
    .note { opacity: 0; }
    .n1 { animation: cdNote 2.4s ease-out infinite; }
    .n2 { animation: cdNote 2.4s ease-out 0.8s infinite; }
    .n3 { animation: cdNote 2.4s ease-out 1.6s infinite; }
    @keyframes cdNote { 0% { opacity: 0; transform: translate(0, 0); } 15%, 60% { opacity: 1; } 100% { opacity: 0; transform: translate(-24px, -90px); } }

  </style>

  <rect x="60" y="698" width="420" height="12" fill="#1e2235" opacity="0.16"/><rect x="80" y="710" width="380" height="6" fill="#1e2235" opacity="0.09"/>
  <g class="pet">
  <g class="ant-l"><image href="p-antenna-left.png" x="69" y="122" width="112" height="228"/></g>
  <g class="ant-r"><image href="p-antenna-right.png" x="164" y="115" width="81" height="232"/></g>
  <g class="arm-big">
    <g style="transform:rotate(10deg);transform-origin:343px 421px"><image href="p-arm-left.png" x="275" y="323" width="137" height="197"/></g>
    <image href="p-claw-2.png" x="385" y="57" width="221" height="334"/>
    <g class="claw-up"><image href="p-claw-1.png" x="280" y="87" width="159" height="295"/></g>
  </g>
  <image href="p-tail-side.png" x="-45" y="470" width="250" height="200" class="tail"/>
  <g class="lg lg1"><image href="p-leg-1.png" x="90" y="550" width="60" height="102"/></g>
  <g class="lg lg2"><image href="p-leg-2.png" x="145" y="558" width="52" height="103"/></g>
  <g class="lg lg3"><image href="p-leg-3.png" x="205" y="558" width="52" height="103"/></g>
  <g class="lg lg4"><image href="p-leg-4.png" x="260" y="550" width="58" height="101"/></g>
  <image href="p-body-face.png" x="123" y="264" width="199" height="338"/>
  <g class="arm-sm"><image href="p-arm-right.png" x="73" y="405" width="123" height="177"/><rect x="88" y="352" width="12" height="124" fill="#1e2235" transform="rotate(26 94 470)"/></g>
  
  <g class="face">
    <g class="brow-l"><image href="p-brow-l.png" x="133" y="283" width="42" height="26"/></g>
    <g class="brow-r"><image href="p-brow-r.png" x="271" y="283" width="41" height="26"/></g>
    <g class="blink"><image href="p-eye-l.png" x="130" y="326" width="45" height="72"/><image href="p-eye-r.png" x="270" y="326" width="43" height="72"/></g>
    <image href="p-cheek-left.png" x="117" y="400" width="66" height="36"/><image href="p-cheek-right.png" x="262" y="395" width="64" height="36"/><g class="mouth"><image href="p-mouth.png" x="183" y="408" width="79" height="57"/></g>
  </g>
  
  
    <g class="note n1" fill="#1e2235">
      <rect x="56" y="276" width="18" height="18"/>
      <rect x="70" y="230" width="6" height="56"/>
    </g>
    <g class="note n2" fill="#1e2235">
      <rect x="112" y="236" width="18" height="18"/>
      <rect x="126" y="188" width="6" height="58"/>
      <rect x="132" y="188" width="16" height="8"/>
      <rect x="140" y="196" width="10" height="10"/>
    </g>
    <g class="note n3" fill="#1e2235">
      <rect x="16" y="212" width="16" height="16"/>
      <rect x="54" y="216" width="16" height="16"/>
      <rect x="28" y="164" width="6" height="56"/>
      <rect x="66" y="168" width="6" height="56"/>
      <rect x="28" y="164" width="44" height="8"/>
      <rect x="28" y="178" width="44" height="8"/>
    </g>
  </g>
</svg>
