    <rect class="dot"      x="30"  y="94" width="32" height="32" fill="#1e2235"/>
    <rect class="dot dot2" x="96"  y="94" width="32" height="32" fill="#1e2235"/>
    <rect class="dot dot3" x="162" y="94" width="32" height="32" fill="#1e2235"/>
  </g>
</svg>
