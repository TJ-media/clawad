<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 0 780 760">
  <style>
    image { image-rendering: pixelated; }
    .face { transform: scale(0.75); transform-origin: 239px 365px; }
    .ant-l { transform-origin: 175px 341px; }
    .ant-r { transform-origin: 233px 338px; }
    .arm-big { transform-origin: 330px 500px; }
    .claw-up { transform-origin: 388px 372px; }
    .arm-sm { transform-origin: 186px 455px; }
    .blink { transform-origin: 222px 390px; }
    .brow-l { transform-origin: 154px 296px; }
    .brow-r { transform-origin: 291px 296px; }
    .pet { transform-origin: 222px 700px; }
    .tail { transform-origin: 190px 560px; }

    .pet { animation: bdBounce 0.9s ease-in-out infinite; }
    @keyframes bdBounce { 0%, 35%, 100% { transform: translateY(0); } 48% { transform: translateY(4px); } 60% { transform: translateY(0); } }
    .brow-l { transform: rotate(24deg) scaleY(0.75); }
    .brow-r { transform: rotate(-24deg) scaleY(0.75); }
    .arm-big { animation: bdArm 0.9s ease-in infinite; }
    @keyframes bdArm { 0%, 15% { transform: rotate(-6deg); } 40%, 55% { transform: rotate(4deg); } 80%, 100% { transform: rotate(-6deg); } }
    .claw-up { animation: bdGrip 0.9s steps(2, jump-none) infinite; }
    @keyframes bdGrip { 0%, 15% { transform: rotate(-10deg); } 40%, 100% { transform: rotate(-2deg); } }
    .hammer { transform-origin: 462px 352px; animation: bdSwing 0.9s ease-in infinite; }
    @keyframes bdSwing { 0%, 15% { transform: rotate(-52deg); } 40%, 55% { transform: rotate(8deg); } 80%, 100% { transform: rotate(-52deg); } }
    .spark { opacity: 0; animation: bdSpark 0.9s linear infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes bdSpark { 0%, 38% { opacity: 0; transform: scale(0.4); } 44%, 56% { opacity: 1; transform: scale(1); } 64%, 100% { opacity: 0; transform: scale(0.4); } }
    .ant-l { animation: bdAnt 0.9s ease-in-out infinite alternate; }
    .ant-r { animation: bdAnt 0.9s ease-in-out 0.2s infinite alternate backwards; }
    @keyframes bdAnt { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

  </style>

  <rect x="60" y="698" width="420" height="12" fill="#1e2235" opacity="0.16"/><rect x="80" y="710" width="380" height="6" fill="#1e2235" opacity="0.09"/>
  <rect x="530" y="606" width="104" height="84" fill="#1e2235"/>
  <rect x="544" y="620" width="34" height="24" fill="#3a405c"/>
  <rect x="586" y="650" width="34" height="26" fill="#3a405c"/>
  <g class="pet">
  <g class="ant-l"><image href="p-antenna-left.png" x="69" y="122" width="112" height="228"/></g>
  <g class="ant-r"><image href="p-antenna-right.png" x="164" y="115" width="81" height="232"/></g>
  <g class="arm-big">
    <g style="transform:rotate(10deg);transform-origin:343px 421px"><image href="p-arm-left.png" x="275" y="323" width="137" height="197"/></g>
    <image href="p-claw-2.png" x="385" y="57" width="221" height="334"/>
    <g class="claw-up"><image href="p-claw-1.png" x="280" y="87" width="159" height="295"/></g>
  </g>
  <image href="p-tail-side.png" x="-45" y="470" width="250" height="200" class="tail"/>
  <g class="lg lg1"><image href="p-leg-1.png" x="90" y="550" width="60" height="102"/></g>
  <g class="lg lg2"><image href="p-leg-2.png" x="145" y="558" width="52" height="103"/></g>
  <g class="lg lg3"><image href="p-leg-3.png" x="205" y="558" width="52" height="103"/></g>
  <g class="lg lg4"><image href="p-leg-4.png" x="260" y="550" width="58" height="101"/></g>
  <image href="p-body-face.png" x="123" y="264" width="199" height="338"/>
  <g class="arm-sm"><image href="p-arm-right.png" x="73" y="405" width="123" height="177"/></g>
  
  <g class="face">
    <g class="brow-l"><image href="p-brow-l.png" x="133" y="283" width="42" height="26"/></g>
    <g class="brow-r"><image href="p-brow-r.png" x="271" y="283" width="41" height="26"/></g>
    <g class="blink"><image href="p-eye-l.png" x="130" y="326" width="45" height="72"/><image href="p-eye-r.png" x="270" y="326" width="43" height="72"/></g>
    <image href="p-cheek-left.png" x="117" y="400" width="66" height="36"/><image href="p-cheek-right.png" x="262" y="395" width="64" height="36"/><image href="p-mouth.png" x="183" y="408" width="79" height="57"/>
  </g>
  
  
    <g class="hammer">
      <rect x="470" y="360" width="18" height="150" fill="#b07840" stroke="#1e2235" stroke-width="6"/>
      <rect x="436" y="486" width="86" height="46" fill="#4a5070" stroke="#1e2235" stroke-width="6"/>
    </g>
    <path class="spark" d="M 560 570 l 8 18 18 8 -18 8 -8 18 -8 -18 -18 -8 18 -8 z" fill="#ffd23e"/>
    <path class="spark" style="animation-delay:0.06s" d="M 620 590 l 7 15 15 7 -15 7 -7 15 -7 -15 -15 -7 15 -7 z" fill="#ff8a5c"/>
  </g>
</svg>
