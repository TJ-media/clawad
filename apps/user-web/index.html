<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>클로애드 리워드 샵</title>
    <style>
      :root {
        --bg: #f7f7f5;
        --card: #ffffff;
        --border: #e5e4df;
        --text: #1f1f1d;
        --muted: #6b6b66;
        --accent: #185fa5;
        --accent-bg: #e6f1fb;
        --danger: #a32d2d;
        --radius: 8px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 18px; background: var(--card); border: 1px solid var(--border);
        border-radius: 12px; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
      }
      .logo { font-size: 16px; font-weight: 600; }
      .logo small { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 6px; }
      .balance {
        display: inline-flex; align-items: baseline; gap: 6px;
        background: var(--accent-bg); color: var(--accent); border-radius: 999px; padding: 7px 15px;
      }
      .balance b { font-size: 15px; }
      button {
        font: inherit; cursor: pointer; border: 1px solid var(--border);
        background: var(--card); color: var(--text); border-radius: var(--radius);
        padding: 7px 14px; transition: background .15s;
      }
      button:hover:not(:disabled) { background: var(--bg); }
      button:disabled { color: var(--muted); cursor: default; opacity: .7; }
      button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
      .chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0 14px; }
      .chip {
        font-size: 13px; padding: 6px 13px; border-radius: 999px; border: 1px solid var(--border);
        background: var(--card); color: var(--muted); cursor: pointer;
      }
      .chip.on { background: var(--text); color: #fff; border-color: var(--text); }
      .section-label { font-size: 12px; color: var(--muted); margin: 14px 2px 8px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
      .product {
        background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px;
        display: flex; flex-direction: column; gap: 2px;
      }
      .product.anchor { border: 2px solid var(--accent); }
      .product .brand { font-size: 12px; color: var(--muted); }
      .product .name { font-size: 15px; font-weight: 500; }
      .product .foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
      .product .cost { font-size: 15px; font-weight: 500; }
      .badge {
        font-size: 11px; padding: 3px 9px; border-radius: 999px; align-self: flex-start;
        background: var(--accent-bg); color: var(--accent); margin-bottom: 6px;
      }
      .notice { font-size: 12px; color: var(--muted); margin-top: 18px; line-height: 1.6; }
      /* 로그인 */
      .login { max-width: 360px; margin: 40px auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
      .login h1 { font-size: 18px; margin: 0 0 4px; }
      .login p { font-size: 13px; color: var(--muted); margin: 0 0 16px; }
      .login input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font: inherit; margin-bottom: 10px; }
      .login button { width: 100%; }
      .login button.social { margin-bottom: 8px; }
      .legal-notice { margin: 16px 0; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; color: var(--muted); }
      .legal-notice p { margin: 0 0 8px; }
      .legal-notice ul { margin: 6px 0; padding-left: 18px; }
      .legal-notice a, .consent-row a { color: var(--accent); }
      .consent-doc { font-size: 13px; color: var(--muted); margin: 0 0 12px; }
      .consent-row { display: flex; align-items: flex-start; gap: 8px; font-size: 14px; margin-bottom: 14px; }
      .consent-row input { width: auto; margin: 3px 0 0; }
      .err { color: var(--danger); font-size: 13px; margin: 8px 0 0; min-height: 18px; }
      /* 모달 */
      .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; padding: 16px; }
      .modal { background: var(--card); border-radius: 12px; padding: 22px; max-width: 380px; width: 100%; }
      .modal h3 { margin: 0 0 8px; font-size: 16px; }
      .modal p { font-size: 14px; color: var(--muted); margin: 0 0 16px; }
      .modal .row { display: flex; gap: 8px; justify-content: flex-end; }
      /* 내역 */
      .hist-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 4px; border-bottom: 1px solid var(--border); font-size: 14px; }
      .status { font-size: 12px; padding: 3px 10px; border-radius: 999px; }
      .st-REQUESTED { background: #faeeda; color: #854f0b; }
      .st-DELIVERED { background: #e1f5ee; color: #0f6e56; }
      .st-DELIVERY_FAILED, .st-CANCELED { background: #fcebeb; color: var(--danger); }
      .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
      .tab { font-size: 14px; padding: 8px 14px; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; border-radius: 0; }
      .tab.on { color: var(--text); border-bottom-color: var(--accent); }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="loginView" class="login">
        <h1>클로애드 리워드 샵</h1>
        <p>소셜 계정으로 로그인하세요. (알파)</p>
        <div id="legalNotice" class="legal-notice">약관과 개인정보처리방침을 불러오는 중입니다.</div>
        <button class="social" disabled onclick="startSocial('google')">Google로 계속하기</button>
        <button class="social" disabled onclick="startSocial('kakao')">Kakao로 계속하기</button>
        <button class="social" disabled onclick="startSocial('naver')">Naver로 계속하기</button>
        <p class="err" id="loginErr"></p>
      </div>

      <div id="shopView" class="hidden">
        <header>
          <div class="logo">클로애드 리워드 샵 <small>알파</small></div>
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="balance">내 확정 포인트 <b id="balance">0P</b></div>
            <button onclick="logout()" style="font-size:13px;">로그아웃</button>
          </div>
        </header>

        <div class="tabs">
          <button class="tab on" id="tabShop" onclick="showTab('shop')">교환하기</button>
          <button class="tab" id="tabHist" onclick="showTab('hist')">교환 내역</button>
        </div>

        <div id="shopPane">
          <div class="chips" id="chips"></div>
          <div id="catalog"></div>
          <p class="notice">
            리워드는 비구매형·비양도형이며 클로애드가 지정한 상품으로만 교환됩니다. 충전·양도·현금 환급을 지원하지 않습니다.<br />
            상품명·상표는 각 브랜드사의 소유이며, 클로애드는 Anthropic·OpenAI를 포함한 어떤 브랜드와도 제휴·후원 관계가 없습니다.<br />
            알파 기간에는 운영자가 쿠폰을 수동 발송합니다(영업일 기준 1~2일 소요).
          </p>
        </div>

        <div id="histPane" class="hidden"></div>
      </div>
    </div>

    <div id="modalRoot"></div>

    <script>
      const API = (window.CLAWAD_API || 'http://localhost:3111');
      const CATS = [
        { key: 'ALL', label: '전체' },
        { key: 'SUBSCRIPTION', label: '구독권' },
        { key: 'CAFE', label: '카페' },
        { key: 'CONVENIENCE', label: '편의점' },
        { key: 'VOUCHER', label: '상품권' },
      ];
      // access token은 메모리(자바스크립트 변수)에만 둔다. 브라우저 영구 저장소에 쓰지 않는다(CLAW-37).
      let token = null;
      let balance = 0;
      let products = [];
      let filter = 'ALL';
      let legalDocuments = null;
      let pendingConsent = null;
      const PROVIDER_LABEL = { google: 'Google', kakao: 'Kakao', naver: 'Naver' };

      async function api(path, opts = {}) {
        const res = await fetch(API + path, {
          ...opts,
          // refresh 토큰 httpOnly 쿠키를 주고받으려면 credentials가 필요하다(CLAW-38).
          credentials: 'include',
          headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}), ...(opts.headers || {}) },
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw Object.assign(new Error(body.error || res.status), { body, status: res.status });
        return body;
      }

      async function loadLegalDocuments() {
        legalDocuments = await api('/v1/legal/documents');
        if (!Array.isArray(legalDocuments.documents) || legalDocuments.documents.length !== 2) {
          throw new Error('LEGAL_DOCUMENTS_INVALID');
        }
        const documentItems = legalDocuments.documents.map((document) => {
          const label = document.type === 'TERMS_OF_SERVICE' ? '서비스 이용약관' : '개인정보처리방침';
          return `<li><a href="${esc(document.url)}" target="_blank" rel="noopener noreferrer">${label}</a> · ${esc(document.version)} · 시행일 ${esc(document.effectiveAt)}</li>`;
        }).join('');
        const disclosures = (legalDocuments.disclosures || []).map((item) => `<li>${esc(item)}</li>`).join('');
        document.getElementById('legalNotice').innerHTML = `
          <p>로그인·가입 전에 운영 문서를 확인하세요.</p>
          <ul>${documentItems}</ul>
          <ul>${disclosures}</ul>
          <p><a href="${esc(legalDocuments.removalGuideUrl)}" target="_blank" rel="noopener noreferrer">동의하지 않을 때 제거 안내</a> ·
          <a href="${esc(legalDocuments.privacyContactUrl)}" target="_blank" rel="noopener noreferrer">개인정보 문의</a></p>`;
        document.querySelectorAll('button.social').forEach((button) => { button.disabled = false; });
        return legalDocuments;
      }

      // 1) 소셜 로그인 시작 — 서버가 준 authorization URL로 이동한다.
      async function startSocial(provider) {
        const errEl = document.getElementById('loginErr');
        errEl.textContent = '';
        try {
          if (!legalDocuments) await loadLegalDocuments();
          const returnTarget = location.origin + location.pathname;
          const r = await api('/v1/auth/social/' + provider + '/start', {
            method: 'POST',
            body: JSON.stringify({ intent: 'LOGIN', returnTarget }),
          });
          window.location.href = r.authorizationUrl;
        } catch (e) {
          errEl.textContent = e.status === 400 ? '해당 로그인 수단이 아직 활성화되지 않았습니다.' : '로그인을 시작하지 못했습니다.';
        }
      }

      // 2) 콜백 복귀 — URL fragment의 handoff code(#code=) 또는 오류(#error=)를 처리한다.
      async function handleReturn() {
        const params = new URLSearchParams(location.hash.slice(1));
        const code = params.get('code');
        const error = params.get('error');
        // 민감정보가 주소창·referrer에 남지 않도록 fragment를 즉시 제거한다.
        history.replaceState(null, '', location.origin + location.pathname);
        if (error) {
          document.getElementById('loginErr').textContent = '로그인이 취소되었거나 실패했습니다.';
          return;
        }
        if (code) { await exchange(code); return; }
        // 콜백 복귀가 아니면, refresh 쿠키로 기존 세션 복원을 시도한다(새로고침해도 로그인 유지).
        await trySilentRefresh();
      }

      // 3) handoff code 교환 — 신규 사용자는 필수 동의 후 재교환한다.
      //    useCookie:true → 서버가 refresh 토큰을 httpOnly 쿠키로 내려주고 본문엔 accessToken만 준다(CLAW-38).
      async function exchange(handoffCode, consents) {
        try {
          const body = { handoffCode, useCookie: true };
          if (consents) body.consents = consents;
          const r = await api('/v1/auth/social/exchange', { method: 'POST', body: JSON.stringify(body) });
          if (r.signupRequired || r.consentRequired) {
            await loadLegalDocuments();
            askConsent(handoffCode, r.provider, r.consentRequired);
            return;
          }
          enterShop(r.accessToken);
        } catch (e) {
          if (e.body && e.body.error === 'CONSENT_VERSION_INVALID' && pendingConsent) {
            try {
              await loadLegalDocuments();
              askConsent(pendingConsent.handoffCode, pendingConsent.provider, pendingConsent.reconsent);
            } catch (reloadError) {
              document.getElementById('loginErr').textContent = '최신 약관을 확인하지 못했습니다. 잠시 후 소셜 로그인을 다시 진행하세요.';
              document.querySelectorAll('button.social').forEach((button) => { button.disabled = true; });
            }
            return;
          }
          document.getElementById('loginErr').textContent =
            e.status === 401 && e.body && e.body.error === 'CONSENT_REQUIRED'
              ? '약관이 개정되었습니다. 소셜 로그인을 다시 진행해 재동의하세요.'
              : e.status === 401 ? '로그인 세션이 만료되었습니다. 다시 시도하세요.' : '로그인에 실패했습니다.';
        }
      }

      // 로그인 성공 공통 처리. access token은 메모리 변수에만 둔다.
      async function enterShop(accessToken) {
        token = accessToken;
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('shopView').classList.remove('hidden');
        await refresh();
      }

      // 새로고침 시 refresh 쿠키로 조용히 세션을 잇는다. 쿠키가 없으면(401) 로그인 화면 유지.
      async function trySilentRefresh() {
        try {
          const r = await api('/v1/auth/refresh', { method: 'POST', body: '{}' });
          await enterShop(r.accessToken);
        } catch (e) {
          if (e.body && e.body.error === 'CONSENT_REQUIRED') {
            document.getElementById('loginErr').textContent = '약관이 개정되었습니다. 소셜 로그인을 다시 진행해 재동의하세요.';
          }
        }
      }

      // 가입·개정 시 필수 동의 UI. 공급자 동의와 별개로 두 문서에 각각 동의한다.
      function askConsent(handoffCode, provider, reconsent) {
        pendingConsent = { handoffCode, provider, reconsent };
        const label = PROVIDER_LABEL[String(provider).toLowerCase()] || provider;
        const byType = Object.fromEntries(legalDocuments.documents.map((document) => [document.type, document]));
        const terms = byType.TERMS_OF_SERVICE;
        const privacy = byType.PRIVACY_POLICY;
        document.getElementById('modalRoot').innerHTML = `<div class="modal-bg">
          <div class="modal">
            <h3>${esc(label)} 계정 ${reconsent ? '필수 재동의' : '가입'}</h3>
            <p class="consent-doc">서비스를 이용하려면 현재 운영 중인 문서에 각각 동의해야 합니다.</p>
            <label class="consent-row"><input type="checkbox" id="termsConsent" onchange="updateConsentSubmit()" />
              <span><a href="${esc(terms.url)}" target="_blank" rel="noopener noreferrer">서비스 이용약관</a> (${esc(terms.version)}, 시행일 ${esc(terms.effectiveAt)})에 동의합니다. (필수)</span></label>
            <label class="consent-row"><input type="checkbox" id="privacyConsent" onchange="updateConsentSubmit()" />
              <span><a href="${esc(privacy.url)}" target="_blank" rel="noopener noreferrer">개인정보처리방침</a> (${esc(privacy.version)}, 시행일 ${esc(privacy.effectiveAt)})에 동의합니다. (필수)</span></label>
            <div class="row">
              <button onclick="cancelConsent()">취소</button>
              <button class="primary" id="consentSubmit" disabled onclick="agreeConsent()">동의하고 계속</button>
            </div>
          </div></div>`;
      }
      function updateConsentSubmit() {
        document.getElementById('consentSubmit').disabled =
          !document.getElementById('termsConsent').checked || !document.getElementById('privacyConsent').checked;
      }
      function cancelConsent() { pendingConsent = null; closeModal(); document.getElementById('loginErr').textContent = '동의하지 않아 가입·로그인이 중단되었습니다. 위의 제거 안내와 개인정보 문의를 이용할 수 있습니다.'; }
      function agreeConsent() {
        const handoffCode = pendingConsent.handoffCode;
        closeModal();
        const consents = legalDocuments.documents.map((document) => ({
          type: document.type,
          granted: true,
          documentVersion: document.version,
        }));
        exchange(handoffCode, consents);
      }

      async function logout() {
        // 서버에서 refresh 토큰을 폐기하고 쿠키를 삭제한다(CLAW-38).
        try { await api('/v1/auth/logout', { method: 'POST', body: '{}' }); } catch (e) {}
        token = null; balance = 0; products = [];
        document.getElementById('shopView').classList.add('hidden');
        document.getElementById('loginView').classList.remove('hidden');
      }

      async function refresh() {
        const [rewards, prods] = await Promise.all([api('/v1/rewards'), api('/v1/rewards/products')]);
        balance = rewards.confirmedPoints;
        products = prods;
        document.getElementById('balance').textContent = balance.toLocaleString('ko-KR') + 'P';
        renderChips();
        renderCatalog();
      }

      function renderChips() {
        document.getElementById('chips').innerHTML = CATS.map(
          (c) => `<span class="chip ${filter === c.key ? 'on' : ''}" onclick="setFilter('${c.key}')">${c.label}</span>`,
        ).join('');
      }
      function setFilter(k) { filter = k; renderChips(); renderCatalog(); }

      function card(p, anchor) {
        const afford = balance >= p.pointCost;
        return `<div class="product ${anchor ? 'anchor' : ''}">
          ${anchor ? '<span class="badge">목표 상품</span>' : ''}
          <div class="brand">${esc(p.brand)}</div>
          <div class="name">${esc(p.name)}</div>
          <div class="foot">
            <span class="cost">${p.pointCost.toLocaleString('ko-KR')}P</span>
            <button class="${afford ? 'primary' : ''}" ${afford ? '' : 'disabled'} onclick="askRedeem('${p.id}')">${afford ? '교환' : '부족'}</button>
          </div>
        </div>`;
      }

      function renderCatalog() {
        const list = filter === 'ALL' ? products : products.filter((p) => p.category === filter);
        const subs = list.filter((p) => p.category === 'SUBSCRIPTION');
        const rest = list.filter((p) => p.category !== 'SUBSCRIPTION');
        let html = '';
        if (subs.length) html += `<p class="section-label">목표 상품</p><div class="grid">${subs.map((p) => card(p, true)).join('')}</div>`;
        if (rest.length) html += `<p class="section-label">지금 교환 가능</p><div class="grid">${rest.map((p) => card(p, false)).join('')}</div>`;
        if (!list.length) html = '<p class="notice">해당 카테고리에 상품이 없습니다.</p>';
        document.getElementById('catalog').innerHTML = html;
      }

      function askRedeem(id) {
        const p = products.find((x) => x.id === id);
        if (!p) return;
        document.getElementById('modalRoot').innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
          <div class="modal">
            <h3>${esc(p.brand)} ${esc(p.name)}</h3>
            <p>${p.pointCost.toLocaleString('ko-KR')}P가 차감됩니다. 알파 기간에는 운영자가 1~2일 내에 수동 발송합니다. 교환하시겠어요?</p>
            <div class="row">
              <button onclick="closeModal()">취소</button>
              <button class="primary" onclick="doRedeem('${p.id}')">교환하기</button>
            </div>
          </div></div>`;
      }
      function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }

      async function doRedeem(id) {
        try {
          await api('/v1/rewards/redeem', { method: 'POST', body: JSON.stringify({ productId: id }) });
          closeModal();
          await refresh();
          alert('교환 신청이 접수되었습니다. 발송 완료까지 1~2일 소요됩니다.');
        } catch (e) {
          closeModal();
          alert(e.status === 409 ? '확정 포인트가 부족합니다.' : '교환에 실패했습니다.');
        }
      }

      const STATUS_KR = { REQUESTED: '신청됨', DELIVERED: '발송 완료', DELIVERY_FAILED: '발송 실패', CANCELED: '취소됨', SUPPLIER_ORDERED: '발주됨' };
      async function showTab(t) {
        document.getElementById('tabShop').classList.toggle('on', t === 'shop');
        document.getElementById('tabHist').classList.toggle('on', t === 'hist');
        document.getElementById('shopPane').classList.toggle('hidden', t !== 'shop');
        document.getElementById('histPane').classList.toggle('hidden', t !== 'hist');
        if (t === 'hist') {
          const items = await api('/v1/rewards/redemptions');
          const byId = Object.fromEntries(products.map((p) => [p.id, p]));
          document.getElementById('histPane').innerHTML = items.length
            ? items.map((r) => {
                const p = byId[r.productId];
                return `<div class="hist-item">
                  <span>${p ? esc(p.brand) + ' ' + esc(p.name) : '상품'} · ${r.pointsDebited.toLocaleString('ko-KR')}P</span>
                  <span class="status st-${r.status}">${STATUS_KR[r.status] || r.status}</span>
                </div>`;
              }).join('')
            : '<p class="notice">교환 내역이 없습니다.</p>';
        }
      }

      function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

      // 운영 문서를 로그인 전에 표시한 뒤 소셜 콜백 handoff를 처리한다.
      loadLegalDocuments().then(handleReturn).catch(() => {
        document.getElementById('loginErr').textContent = '약관·개인정보처리방침을 확인하지 못해 로그인을 시작할 수 없습니다.';
        document.querySelectorAll('button.social').forEach((button) => { button.disabled = true; });
      });
    </script>
  </body>
</html>
